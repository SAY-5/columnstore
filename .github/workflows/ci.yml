name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  format-check:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: install clang-format 18
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg lsb-release software-properties-common
          wget -O- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add -
          sudo add-apt-repository -y "deb http://apt.llvm.org/jammy/ llvm-toolchain-jammy-18 main"
          sudo apt-get update
          sudo apt-get install -y clang-format-18
          sudo update-alternatives --install /usr/bin/clang-format clang-format /usr/bin/clang-format-18 100
          clang-format --version
      - name: check format
        run: make check-format

  build-x86_64:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        compiler:
          - { cxx: g++, cc: gcc }
          - { cxx: clang++, cc: clang }
    env:
      CC: ${{ matrix.compiler.cc }}
      CXX: ${{ matrix.compiler.cxx }}
    steps:
      - uses: actions/checkout@v4
      - name: cpu info
        run: |
          cat /proc/cpuinfo | grep -E "model name|flags" | head -3
          if grep -q avx2 /proc/cpuinfo; then echo "AVX2 supported"; fi
      - name: configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
      - name: build
        run: cmake --build build -j
      - name: ctest
        run: ctest --test-dir build --output-on-failure
        env:
          COLUMNSTORE_INTEGRATION_ROWS: "1000000"

  build-x86_64-asan:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: configure
        run: cmake -S . -B build-asan -DCMAKE_BUILD_TYPE=Debug -DCOLUMNSTORE_ENABLE_ASAN=ON -DCMAKE_CXX_COMPILER=clang++
      - name: build
        run: cmake --build build-asan -j
      - name: ctest
        run: ctest --test-dir build-asan --output-on-failure
        env:
          COLUMNSTORE_INTEGRATION_ROWS: "500000"
          ASAN_OPTIONS: "detect_leaks=1:halt_on_error=1"
          UBSAN_OPTIONS: "halt_on_error=1:print_stacktrace=1"

  avx2-tests:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: confirm AVX2 on runner
        run: grep -q avx2 /proc/cpuinfo
      - name: configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
      - name: build
        run: cmake --build build -j
      - name: run unit tests (AVX2 path active)
        run: ./build/columnstore_unit_tests
      - name: run sample query with AVX2
        run: ./build/columnstore --rows 1000000 --threshold 1000

  scalar-tests:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: configure
        run: cmake -S . -B build-scalar -DCMAKE_BUILD_TYPE=Release -DCOLUMNSTORE_FORCE_SCALAR=ON
      - name: build
        run: cmake --build build-scalar -j
      - name: run unit tests (scalar path)
        env:
          COLUMNSTORE_FORCE_SCALAR: "1"
        run: ./build-scalar/columnstore_unit_tests
      - name: ctest (scalar path)
        env:
          COLUMNSTORE_INTEGRATION_ROWS: "500000"
          COLUMNSTORE_FORCE_SCALAR: "1"
        run: ctest --test-dir build-scalar --output-on-failure

  fuzz-smoke:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: install clang
        run: sudo apt-get update && sudo apt-get install -y clang
      - name: configure
        run: cmake -S . -B build-fuzz -DCMAKE_BUILD_TYPE=Debug -DCOLUMNSTORE_BUILD_FUZZ=ON -DCMAKE_CXX_COMPILER=clang++
      - name: build fuzzers
        run: cmake --build build-fuzz --target rle_fuzz filter_fuzz -j
      - name: rle_fuzz smoke
        run: ./build-fuzz/rle_fuzz -runs=10000 -max_total_time=60 -timeout=5
      - name: filter_fuzz smoke
        run: ./build-fuzz/filter_fuzz -runs=10000 -max_total_time=60 -timeout=5

  bench-smoke:
    runs-on: ubuntu-22.04
    needs: [build-x86_64]
    steps:
      - uses: actions/checkout@v4
      - name: configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
      - name: build bench
        run: cmake --build build --target scan_bench filter_bench aggregate_bench -j
      - name: scan bench smoke
        env:
          COLUMNSTORE_BENCH_ROWS: "1000000"
          COLUMNSTORE_BENCH_ITERS: "3"
        run: |
          set -e
          out=$(./build/scan_bench)
          echo "$out"
          # Pull the M values/sec line and assert >= 100M v/s floor.
          mvs=$(echo "$out" | awk '/throughput/ && /M values\/sec/ { print $(NF-2); exit }')
          echo "best throughput M v/s: $mvs"
          awk -v v="$mvs" 'BEGIN { if (v+0 < 100.0) { print "FAIL: throughput below 100M v/s floor"; exit 1 } else { print "PASS" } }'
      - name: filter bench smoke
        env:
          COLUMNSTORE_BENCH_ROWS: "1000000"
          COLUMNSTORE_BENCH_ITERS: "3"
        run: ./build/filter_bench
      - name: aggregate bench smoke
        env:
          COLUMNSTORE_BENCH_ROWS: "1000000"
          COLUMNSTORE_BENCH_ITERS: "3"
        run: ./build/aggregate_bench

  coverage:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: install lcov
        run: |
          sudo apt-get update
          sudo apt-get install -y lcov
      - name: configure (gcov)
        run: cmake -S . -B build-cov -DCMAKE_BUILD_TYPE=Debug -DCOLUMNSTORE_ENABLE_COVERAGE=ON
      - name: build
        run: cmake --build build-cov -j
      - name: run tests
        run: ctest --test-dir build-cov --output-on-failure
        env:
          COLUMNSTORE_INTEGRATION_ROWS: "200000"
      - name: collect coverage
        run: |
          lcov --capture --directory build-cov --output-file build-cov/coverage.info \
            --rc lcov_branch_coverage=0 --ignore-errors gcov,source 2>/dev/null \
            || lcov --capture --directory build-cov --output-file build-cov/coverage.info \
              --rc lcov_branch_coverage=0
          lcov --remove build-cov/coverage.info \
            '/usr/*' '*/_deps/*' '*/tests/*' '*/bench/*' \
            --output-file build-cov/coverage.filtered.info \
            --rc lcov_branch_coverage=0 2>/dev/null \
            || lcov --remove build-cov/coverage.info \
              '/usr/*' '*/_deps/*' '*/tests/*' '*/bench/*' \
              --output-file build-cov/coverage.filtered.info
          lcov --list build-cov/coverage.filtered.info \
            --rc lcov_branch_coverage=0 | tee build-cov/coverage.summary
      - name: enforce coverage floor
        run: |
          set -e
          # v1 gate: +5pp above the v0 implicit floor. v0 had no coverage
          # job; this is the first published number. Floor set to 70%
          # (rounded down) so the gate is enforceable on every PR.
          pct=$(grep -E 'Total:\|' build-cov/coverage.summary | head -1 | awk -F'[|%]' '{print $2}' | tr -d ' ')
          if [ -z "$pct" ]; then
            pct=$(grep -oE '[0-9]+\.[0-9]+%' build-cov/coverage.summary | head -1 | tr -d '%')
          fi
          echo "line coverage: $pct%"
          awk -v p="$pct" 'BEGIN { if (p+0 < 70.0) { print "FAIL: coverage " p "% below 70% floor"; exit 1 } else { print "PASS: coverage " p "% >= 70%" } }'

  bench-regress:
    runs-on: ubuntu-22.04
    needs: [build-x86_64]
    steps:
      - uses: actions/checkout@v4
      - name: configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
      - name: build benches
        run: cmake --build build --target scan_bench filter_bench aggregate_bench -j
      - name: generate candidate at 1M, 10M
        # Note: 100M takes too long for CI smoke; we run that locally and
        # commit results. The CI regression gate covers 1M and 10M sizes.
        run: |
          rm -f /tmp/cand.jsonl
          for n in 1000000 10000000; do
            COLUMNSTORE_BENCH_ROWS=$n COLUMNSTORE_BENCH_ITERS=5 \
              COLUMNSTORE_BENCH_JSON_OUT=/tmp/cand.jsonl \
              COLUMNSTORE_BENCH_LABEL=ci \
              ./build/filter_bench > /dev/null
            COLUMNSTORE_BENCH_ROWS=$n COLUMNSTORE_BENCH_ITERS=5 \
              COLUMNSTORE_BENCH_JSON_OUT=/tmp/cand.jsonl \
              COLUMNSTORE_BENCH_LABEL=ci \
              ./build/aggregate_bench > /dev/null
            COLUMNSTORE_BENCH_ROWS=$n COLUMNSTORE_BENCH_ITERS=5 \
              COLUMNSTORE_BENCH_JSON_OUT=/tmp/cand.jsonl \
              COLUMNSTORE_BENCH_LABEL=ci \
              ./build/scan_bench > /dev/null
          done
          echo "--- candidate jsonl ---"
          cat /tmp/cand.jsonl
      - name: run regression gate
        run: |
          python3 bench/regress.py \
            --baseline bench/results/ci_baseline.jsonl \
            --candidate /tmp/cand.jsonl \
            --max-drift 0.30
      - name: upload candidate as artifact
        uses: actions/upload-artifact@v4
        with:
          name: bench-candidate
          path: /tmp/cand.jsonl

  docker:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: build image (x86_64)
        run: docker build -t columnstore:ci .
      - name: smoke run
        run: docker run --rm columnstore:ci --rows 200000 --threshold 1000
